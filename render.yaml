services:
  - type: web
    name: syria-travel-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: API_URL
        value: ""
      - key: UPLOAD_DIR
        value: public/uploads
      - key: DB_PATH
        value: data.sqlite
      - key: DB_BACKUP_DIR
        value: backups
      - key: LOG_LEVEL
        value: combined
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
