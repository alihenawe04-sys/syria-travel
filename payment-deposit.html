<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="api-url" content="">
<title>دفعة مقدمة - Syria Travel</title>
<script>
(function(){try{var t=localStorage.getItem('syria-travel-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
function getQueryParam(name){var u=new URLSearchParams(window.location.search);return u.get(name)||''}
const API_BASE=(function(){var m=document.querySelector('meta[name="api-url"]'),u=m?m.getAttribute('content'):'';if(u)return u;var s=localStorage.getItem('syria_api_url');return s||''})();
</script>
<style>
:root{--gold-primary:#C9A96E;--gold-dark:#AF8B4C;--bg-dark:#05080F;--bg-card:rgba(15,23,36,0.65);--text-primary:#E8E0D0;--text-secondary:#A09880;--bg-page:#0A0F1A;--border-color:rgba(201,169,110,0.15);--shadow-color:rgba(201,169,110,0.08);--input-bg:rgba(15,23,36,0.5);--success:#2ECC71;--error:#E74C3C;}
[data-theme="light"]{--bg-dark:#F5F0E8;--bg-card:rgba(255,255,255,0.75);--text-primary:#2C2416;--text-secondary:#6B5D44;--bg-page:#FAF7F2;--border-color:rgba(201,169,110,0.3);--shadow-color:rgba(201,169,110,0.15);--input-bg:rgba(255,255,255,0.7);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;}
body{background:var(--bg-page);color:var(--text-primary);min-height:100vh;line-height:1.6;transition:background 0.3s,color 0.3s;}
.container{max-width:520px;margin:0 auto;padding:16px;}
.header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border-color);margin-bottom:24px;}
.header a{color:var(--gold-primary);text-decoration:none;font-size:20px;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
.header a:hover{color:var(--gold-dark);}
.header .logo{font-size:22px;font-weight:700;color:var(--gold-primary);margin-right:auto;letter-spacing:1px;}
.header .logo span{font-size:18px;margin-left:6px;}
.card{background:var(--bg-card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 8px 32px var(--shadow-color);transition:background 0.3s,border-color 0.3s;}
.card-title{font-size:15px;font-weight:600;color:var(--gold-primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{}
.info-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.info-value{font-size:14px;font-weight:600;color:var(--text-primary);word-break:break-all;}
.info-value.gold{color:var(--gold-primary);}
.percentage-grid{display:flex;gap:10px;margin-bottom:16px;}
.pct-btn{flex:1;padding:12px;border:1px solid var(--border-color);border-radius:10px;background:var(--input-bg);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.pct-btn:hover{border-color:var(--gold-primary);color:var(--gold-primary);}
.pct-btn.active{background:linear-gradient(135deg,var(--gold-primary),var(--gold-dark));color:#0A0F1A;border-color:var(--gold-primary);box-shadow:0 4px 16px rgba(201,169,110,0.25);}
.amount-display{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.amount-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--input-bg);border-radius:10px;border:1px solid var(--border-color);}
.amount-row .label{font-size:13px;color:var(--text-secondary);}
.amount-row .value{font-size:16px;font-weight:700;color:var(--text-primary);direction:ltr;}
.amount-row .value.gold{color:var(--gold-primary);}
.amount-row .value.remain{color:#2ECC71;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-primary{background:linear-gradient(135deg,var(--gold-primary),var(--gold-dark));color:#0A0F1A;box-shadow:0 4px 20px rgba(201,169,110,0.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,169,110,0.35);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.spinner{width:20px;height:20px;border:2px solid rgba(10,15,26,0.2);border-top-color:#0A0F1A;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.spinner.show{display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{padding:14px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none;align-items:center;gap:10px;}
.msg.show{display:flex;}
.msg.success{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.25);color:#2ECC71;}
.msg.error{background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.25);color:#E74C3C;}
.theme-toggle{position:fixed;top:16px;left:16px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border-color);background:var(--bg-card);backdrop-filter:blur(8px);color:var(--gold-primary);font-size:18px;cursor:pointer;z-index:100;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.theme-toggle:hover{border-color:var(--gold-primary);}
.success-overlay{position:fixed;inset:0;background:rgba(5,8,15,0.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);}
.success-overlay.show{display:flex;}
.success-box{text-align:center;padding:40px;}
.success-box .check{font-size:64px;color:#2ECC71;margin-bottom:16px;animation:pop 0.5s ease;}
.success-box h2{color:var(--gold-primary);margin-bottom:8px;font-size:20px;}
.success-box p{color:var(--text-secondary);font-size:14px;}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@media(max-width:480px){.container{padding:12px}.card{padding:16px}.info-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">◐</button>
<div class="container">
  <div class="header">
    <a href="/" title="العودة إلى الرئيسية">&larr; <span style="font-size:13px;font-weight:400;">الرئيسية</span></a>
    <div class="logo"><span>✦</span> Syria Travel</div>
  </div>

  <div class="card">
    <div class="card-title"><span>📋</span> معلومات الحجز</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">رقم الحجز</div>
        <div class="info-value" id="bookingId">---</div>
      </div>
      <div class="info-item">
        <div class="info-label">العميل</div>
        <div class="info-value" id="customerName">---</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>📊</span> اختيار نسبة الدفعة المقدمة</div>
    <div class="percentage-grid">
      <button class="pct-btn" data-pct="25">25%</button>
      <button class="pct-btn active" data-pct="50">50%</button>
      <button class="pct-btn" data-pct="75">75%</button>
    </div>
    <div class="amount-display">
      <div class="amount-row">
        <span class="label">المبلغ الإجمالي</span>
        <span class="value gold" id="totalAmount">0 USD</span>
      </div>
      <div class="amount-row">
        <span class="label">الدفعة المقدمة</span>
        <span class="value gold" id="depositAmount">0 USD</span>
      </div>
      <div class="amount-row">
        <span class="label">المبلغ المتبقي</span>
        <span class="value remain" id="remainAmount">0 USD</span>
      </div>
    </div>
  </div>

  <div id="messages"></div>
  <button class="btn btn-primary" id="payBtn">
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Proceed to Payment</span>
  </button>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="check">✓</div>
    <h2>تمت عملية الدفع بنجاح!</h2>
    <p>سيتم توجيهك إلى الصفحة الرئيسية...</p>
  </div>
</div>

<script>
(function(){
  var s=getQueryParam('amount')||getQueryParam('total')||'0';
  var total=parseFloat(s.replace(/[^0-9.]/g,''))||0;
  document.getElementById('totalAmount').textContent=total.toFixed(2)+' USD';
  var bookingId=getQueryParam('booking_id')||getQueryParam('bookingId')||'N/A';
  var customer=getQueryParam('customer_name')||getQueryParam('customer')||'N/A';
  document.getElementById('bookingId').textContent=bookingId;
  document.getElementById('customerName').textContent=customer;

  var activePct=50;
  var depositEl=document.getElementById('depositAmount');
  var remainEl=document.getElementById('remainAmount');

  function updateAmounts(pct){
    activePct=pct;
    var dep=total*pct/100;
    var rem=total-dep;
    depositEl.textContent=dep.toFixed(2)+' USD';
    remainEl.textContent=rem.toFixed(2)+' USD';
    document.querySelectorAll('.pct-btn').forEach(function(b){
      b.classList.toggle('active',parseFloat(b.dataset.pct)===pct);
    });
  }
  updateAmounts(50);

  document.querySelectorAll('.pct-btn').forEach(function(b){
    b.addEventListener('click',function(){updateAmounts(parseFloat(this.dataset.pct));});
  });
})();

(function(){
  var toggle=document.getElementById('themeToggle');
  toggle.addEventListener('click',function(){
    var html=document.documentElement;
    var cur=html.getAttribute('data-theme')||'dark';
    var next=cur==='dark'?'light':'dark';
    html.setAttribute('data-theme',next);
    try{localStorage.setItem('syria-travel-theme',next);}catch(e){}
  });
})();

(function(){
  var btn=document.getElementById('payBtn');
  var spinner=document.getElementById('spinner');
  var btnText=document.getElementById('btnText');
  var msgBox=document.getElementById('messages');
  var overlay=document.getElementById('successOverlay');

  function showMsg(type,text){
    msgBox.innerHTML='<div class="msg show '+type+'"><span>'+(type==='success'?'✓':'✗')+'</span>'+text+'</div>';
    msgBox.scrollIntoView({behavior:'smooth'});
  }

  btn.addEventListener('click',function(){
    var total=parseFloat(document.getElementById('totalAmount').textContent)||0;
    var deposit=parseFloat(document.getElementById('depositAmount').textContent)||0;
    if(total<=0){showMsg('error','المبلغ الإجمالي غير صالح');return;}
    btn.disabled=true;spinner.classList.add('show');btnText.textContent='جاري المعالجة...';

    var body=JSON.stringify({
      booking_id:getQueryParam('booking_id')||getQueryParam('bookingId')||'',
      customer_name:getQueryParam('customer_name')||getQueryParam('customer')||'',
      total_amount:total,
      deposit_percentage:activePct,
      deposit_amount:deposit,
      payment_method:'card_deposit'
    });

    var token = '';
    try{token=localStorage.getItem('syria_token')||'';}catch(e){}
    var hdrs = {'Content-Type':'application/json'};
    if(token) hdrs['Authorization'] = 'Bearer ' + token;
    fetch(API_BASE+'/api/payments/deposit',{method:'POST',headers:hdrs,body:body})
    .then(function(r){if(!r.ok)throw new Error('Network error');return r.json();})
    .then(function(data){
      spinner.classList.remove('show');btnText.textContent='تم ✓';
      overlay.classList.add('show');
      setTimeout(function(){window.location.href='/';},3000);
    })
    .catch(function(err){
      spinner.classList.remove('show');btn.disabled=false;btnText.textContent='Proceed to Payment';
      showMsg('error','حدث خطأ أثناء معالجة الدفع. يرجى المحاولة مرة أخرى.');
    });
  });
})();
</script>
</body>
</html>
